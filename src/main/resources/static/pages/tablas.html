<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas Auxiliares - Sistema de Infracciones Viales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-shield-fill me-2" style="color:#1565c0;"></i>
            Sistema de Infracciones Viales
        </span>
        <a href="/index.html" class="btn btn-sm btn-outline-light">
            <i class="bi bi-arrow-left me-1"></i> Inicio
        </a>
    </div>
</nav>

<div class="container-fluid px-4 py-4" style="max-width:1200px;">

    <div class="d-flex justify-content-between align-items-center page-header-bar">
        <div>
            <p class="text-muted mb-0" style="font-size:0.75rem;">
                <i class="bi bi-house me-1"></i> Inicio / Tablas Auxiliares
            </p>
            <h1 class="page-title mb-0">Tablas Auxiliares</h1>
        </div>
    </div>

    <div id="alertContainer"></div>

    <!-- TABS -->
    <ul class="nav nav-tabs mb-3" id="tabsAuxiliares">
        <li class="nav-item">
            <button class="nav-link active" onclick="cambiarTab('marcas', this)">
                <i class="bi bi-tag me-1"></i>Marcas
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('modelos', this)">
                <i class="bi bi-tag me-1"></i>Modelos
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('tipoRutas', this)">
                <i class="bi bi-signpost me-1"></i>Tipos de Ruta
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('rutas', this)">
                <i class="bi bi-signpost-2 me-1"></i>Rutas
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('organizaciones', this)">
                <i class="bi bi-building me-1"></i>Organizaciones
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('estadosActa', this)">
                <i class="bi bi-flag me-1"></i>Estados del Acta
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="cambiarTab('tiposInfraccion', this)">
                <i class="bi bi-exclamation-triangle me-1"></i>Tipos de Infracción
            </button>
        </li>
    </ul>

    <!-- CONTENIDO TAB -->
    <div class="card section-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 id="tabTitle"><i class="bi bi-tag me-2"></i>Marcas de Vehículos</h6>
            <div class="d-flex gap-2 align-items-center">
                <span class="badge bg-secondary" id="totalBadge">0 registros</span>
                <button class="btn btn-primary btn-sm" id="btnNuevo" onclick="abrirModal()">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo
                </button>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="tablaAuxiliar">
                    <thead id="tablaHead"></thead>
                    <tbody id="tablaBody">
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">
                            <i class="bi bi-hourglass-split me-2"></i>Cargando...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- MODAL SIMPLE (nombre) -->
<div class="modal fade" id="modalSimple" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalSimpleTitle">Nuevo Registro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="msId">
                <div class="mb-3">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control form-control-sm" id="msNombre" placeholder="Nombre">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" onclick="guardarSimple()">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL RUTA -->
<div class="modal fade" id="modalRuta" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalRutaTitle">Nueva Ruta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mrId">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control form-control-sm" id="mrNombre" placeholder="Ej: Ruta Nacional 7">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Kilómetro</label>
                        <input type="text" class="form-control form-control-sm" id="mrKm" placeholder="Ej: Km 1050">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tipo de Ruta *</label>
                        <select class="form-select form-select-sm" id="mrTipo">
                            <option value="">Seleccionar...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" onclick="guardarRuta()">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL ESTADO -->
<div class="modal fade" id="modalEstado" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalEstadoTitle">Nuevo Estado</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="meId">
                <div class="mb-3">
                    <label class="form-label">Nombre del Estado *</label>
                    <input type="text" class="form-control form-control-sm" id="meNombre" placeholder="Ej: Pendiente">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" onclick="guardarEstado()">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL TIPO INFRACCIÓN -->
<div class="modal fade" id="modalTipoInf" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTipoInfTitle">Nuevo Tipo de Infracción</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="mtiId">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Código *</label>
                        <input type="text" class="form-control form-control-sm" id="mtiCodigo" placeholder="Ej: VEL001">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Descripción *</label>
                        <input type="text" class="form-control form-control-sm" id="mtiDesc" placeholder="Descripción">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" onclick="guardarTipoInfraccion()">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminación
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0">¿Está seguro que desea eliminar este registro?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarEliminar">
                    <i class="bi bi-trash me-1"></i> Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/tablas.js"></script>
</body>
</html>
