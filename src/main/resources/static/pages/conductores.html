<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductores - Sistema de Infracciones Viales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-shield-fill me-2" style="color:#0096b7;"></i>
            Sistema de Infracciones Viales
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white small opacity-75">
                <i class="bi bi-person-circle me-1"></i>
                <span id="navUsuario"></span>
            </span>
            <a href="/index.html" class="btn btn-sm" style="background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.4);">
                <i class="bi bi-arrow-left me-1"></i> Inicio
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4" style="max-width:1400px;">

    <div class="d-flex justify-content-between align-items-center page-header-bar">
        <div>
            <p class="text-muted mb-0" style="font-size:0.75rem;">
                <i class="bi bi-house me-1"></i> Inicio / Conductores
            </p>
            <h1 class="page-title mb-0">Conductores</h1>
        </div>
        <button class="btn btn-primary btn-sm" id="btnNuevo" onclick="abrirModal()">
            <i class="bi bi-plus-lg me-1"></i> Nuevo Conductor
        </button>
    </div>

    <div id="alertContainer"></div>

    <div class="card section-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6><i class="bi bi-person me-2"></i>Padrón de Conductores</h6>
            <span class="badge bg-secondary" id="totalBadge">0 registros</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>DNI</th>
                        <th>Apellido</th>
                        <th>Nombre</th>
                        <th>Género</th>
                        <th>Domicilio</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr>
                        <td colspan="7" class="text-center py-4 text-muted">
                            <i class="bi bi-hourglass-split me-2"></i>Cargando...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- MODAL NUEVO/EDITAR -->
<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">
                    <i class="bi bi-person-plus me-2"></i>Nuevo Conductor
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="itemId">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">DNI *</label>
                        <input type="text" class="form-control form-control-sm" id="fDni" placeholder="Ej: 30123456" inputmode="numeric">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control form-control-sm" id="fNombre" placeholder="Nombre">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Apellido *</label>
                        <input type="text" class="form-control form-control-sm" id="fApellido" placeholder="Apellido">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Género</label>
                        <select class="form-select form-select-sm" id="fGenero">
                            <option value="">Seleccionar...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Domicilio</label>
                        <input type="text" class="form-control form-control-sm" id="fDomicilio" placeholder="Domicilio completo">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" onclick="guardar()">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminación
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0">¿Está seguro que desea eliminar este conductor?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarEliminar">
                    <i class="bi bi-trash me-1"></i> Eliminar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/conductores.js"></script>
</body>
</html>
